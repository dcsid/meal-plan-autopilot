services:
  - type: web
    name: meal-plan-autopilot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --worker-tmp-dir /tmp
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/meal_autopilot.db
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: AUTO_SEED_DATA
        value: "true"
      - key: AUTO_SEED_DEMO_PANTRY
        value: "true"
